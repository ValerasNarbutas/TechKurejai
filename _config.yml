title: TechKurejai
description: >-
  Practical articles, tools, and tips for developers who build things.
  No fluff — just craft.

baseurl: "/TechKurejai"
url: "https://valerasnarbutas.github.io"

author:
  name: Valeras Narbutas
  github: ValerasNarbutas
  bio: "Developer, builder, open source enthusiast. Writes about tools that actually matter."
  avatar: "https://github.com/ValerasNarbutas.png"

show_excerpts: true

markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge

sass:
  sass_dir: _sass
  style: compressed

plugins:
  - jekyll-feed
  - jekyll-seo-tag

nav_links:
  - title: Home
    url: /TechKurejai/
  - title: Categories
    url: /TechKurejai/categories/
  - title: Tags
    url: /TechKurejai/tags/
  - title: About
    url: /TechKurejai/about/

exclude:
  - CONTRIBUTING.md
  - "*.gemspec"
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
