title: TechKurejai
description: >-
  Practical articles, tools, and tips for developers who build things.
  No fluff — just craft.

baseurl: "/TechKurejai"
url: "https://valerasnarbutas.github.io"

theme: minima

author:
  name: Valeras Narbutas
  github: ValerasNarbutas

minima:
  date_format: "%B %-d, %Y"
  social_links:
    - { platform: github, user_url: "https://github.com/ValerasNarbutas" }

show_excerpts: true

markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge

plugins:
  - jekyll-feed
  - jekyll-seo-tag

exclude:
  - CONTRIBUTING.md
  - "*.gemspec"
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
